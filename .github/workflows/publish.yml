name: Publish SDK
on:
  workflow_run:
    workflows: [CI-SDK]
    branches: [main]
    types: [completed]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write          # NEW - required for OIDC → npm

defaults:
  run:
    working-directory: extension-files/bringweb3-sdk

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'yarn'
          cache-dependency-path: 'extension-files/bringweb3-sdk/yarn.lock'
          registry-url: 'https://registry.npmjs.org'   # NEW - ensures .npmrc points at npmjs

      - name: Upgrade npm to OIDC-capable version
        run: npm install -g npm@latest   # NEW - need >= 11.5.1; lts/* ships with npm 10.x

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1.4.9
        with:
          publish: yarn release
          cwd: "${{ github.workspace }}/extension-files/bringweb3-sdk"
          commit: "chore(release): version SDK package"
          title: "chore(release): version SDK package"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}